# Virtual (simulator) site.
# NOTE: device role bindings are now chosen at runtime from the web console (Devices
# panel) and persisted to data/bindings.json — this file only provides defaults for
# the site id and the INDI server host/port. The `devices` list below is informational
# (it documents the expected sim devices). See docs/plan/02-DEVICE-CONTROL.md.

site:
  id: virtual
  name: Virtual Test Site

indi:
  host: localhost
  port: 7624

devices:
  - id: vmount
    role: mount
    adapter: indi
    indi_device: "Telescope Simulator"   # real: "EQMod Mount"
  - id: vcam
    role: camera
    adapter: indi
    indi_device: "CCD Simulator"         # real: e.g. "Toupcam Minicam8"
  - id: vfoc
    role: focuser
    adapter: indi
    indi_device: "Focuser Simulator"     # real: e.g. "Toupcam AAF"
  - id: vwheel
    role: filterwheel
    adapter: indi
    indi_device: "Filter Simulator"      # real: your filter wheel (optional)
